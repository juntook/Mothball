name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rules:
    name: Validate rule library
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Schema + semantic validation
        run: ./scripts/validate-rules.sh
      - name: Localization catalogs in sync
        run: python3 scripts/gen-localizations.py --check
      - name: Bundled rules in sync
        run: ./scripts/sync-rules.sh --check

  build-test:
    name: Build & test (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
