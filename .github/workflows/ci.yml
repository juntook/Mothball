name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rules:
    name: Validate rule library
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Schema + semantic validation
        run: ./scripts/validate-rules.sh
      - name: Localization catalogs in sync
        run: python3 scripts/gen-localizations.py --check
      - name: Bundled rules in sync
        run: ./scripts/sync-rules.sh --check

  build-test:
    name: Build & test (arm64)
    # macos-15 ships Xcode 16 / Swift 6; the package manifest requires
    # swift-tools-version 6.0, which macos-14's toolchains cannot parse.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
